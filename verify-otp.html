<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP - PM4Success</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-container auth-container-sm">
      <h1>Verify OTP Code</h1>
      <p class="auth-subtitle">A verification code has been sent to your email.<br>Please enter the code into the field below to complete your sign-up and verify your account.</p>

      <form action="login.html">
        <div class="form-group">
          <input type="text" class="form-control otp-input" placeholder="Enter OTP code here" maxlength="6" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">Verify OTP</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
